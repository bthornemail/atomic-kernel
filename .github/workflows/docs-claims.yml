name: docs-claims

on:
  push:
    branches: [main]
  pull_request:

jobs:
  claim-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify claim evidence links
        run: python3 scripts/check_claims.py
